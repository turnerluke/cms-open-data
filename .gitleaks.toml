# ==============================================================================================================================
# .gitleaks.toml
# ==============================================================================================================================
# Gitleaks configuration
# https://github.com/gitleaks/gitleaks
# ==============================================================================================================================

[extend]
useDefault = true

[allowlist]
description = "Allowlist for test files and example credentials"

# Fake/mock credentials for unit testing purposes.
# datasets.toml is the public dataset registry — every value is a CMS
# dataset id, asset key, or human description. Some snake_case keys
# (e.g. ``qhp_landscape_individual_medical_2026``) trip gitleaks's
# generic-api-key entropy heuristic, so we allowlist the file outright;
# secrets cannot end up here by design.
paths = ['''.*tests/.*\.py$''', '''.*test_.*\.py$''', '''.*libs/cms_api/datasets\.toml$''']

regexes = [
    # AWS example credentials from official AWS documentation.
    # These are explicitly designated as fake/example values by AWS and are
    # safe to use in documentation and tests.
    # Source: https://docs.aws.amazon.com/IAM/latest/UserGuide/id_credentials_access-keys.html
    '''AKIAIOSFODNN7EXAMPLE''',
    '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',

    # Generic test placeholder for password field
    '''testpass''',

    # Fake JWT token used in test fixtures
    # with a dummy ".test" signature
    '''eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9\.test''',
]
