# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks
---
# Auto-install both file-staging hooks (pre-commit) and commit-msg hooks so a
# single `pre-commit install` wires up everything, including commitlint below.
default_install_hook_types: [pre-commit, commit-msg]

repos:
  # ============================================================================================================================
  # General file checks
  # ============================================================================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-docstring-first
      - id: check-toml
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-json
      - id: debug-statements
      - id: detect-aws-credentials
        args: [--allow-missing-credentials]
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # ============================================================================================================================
  # Commit message linting
  # ============================================================================================================================
  # gitlint covers title regex, body length, banned words, WIP escape hatch.
  - repo: https://github.com/jorisroovers/gitlint
    rev: v0.19.1
    hooks:
      - id: gitlint

  # commitlint runs the SAME config CI uses (.commitlintrc.cjs), so the
  # custom subject-case-allow-backticks rule is enforced locally too.
  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies:
          - "@commitlint/cli@19.6.1"
          - "@commitlint/config-conventional@19.6.0"

  # ============================================================================================================================
  # Language-specific linting and formatting
  # ============================================================================================================================

  # YAML
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args: [-c=.yamllint.yml]

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args: [--config, .markdownlint.yml]

  # Prettier (JS, TS, JSON, YAML, Markdown, CSS, HTML, TOML)
  - repo: https://github.com/JoC0de/pre-commit-prettier
    rev: v3.4.2
    hooks:
      - id: prettier
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css, scss, html, toml]
        args: [--write, --ignore-unknown]
        additional_dependencies:
          - prettier@3.4.2
          - prettier-plugin-toml@2.0.1

  # Python docstring coverage
  - repo: https://github.com/econchick/interrogate
    rev: "1.7.0"
    hooks:
      - id: interrogate
        args: [-v]
        exclude: tests/

  # Python linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.0
    hooks:
      - id: ruff

  # ============================================================================================================================
  # Registry-driven dbt sources
  # ============================================================================================================================
  # When `libs/cms_api/datasets.toml` changes, regenerate the dbt sources YAML
  # so the two stay in sync without anyone having to remember. The pytest
  # backstop at `tests/test_dbt_sources_in_sync.py` catches drift if the hook
  # is skipped (`--no-verify`).
  - repo: local
    hooks:
      - id: gen-cms-sources
        name: regenerate dbt sources from registry
        language: system
        entry: uv run python scripts/gen_cms_sources.py --write
        files: ^(libs/cms_api/datasets\.toml|scripts/gen_cms_sources\.py)$
        pass_filenames: false

  # ============================================================================================================================
  # SQL (dbt models)
  # ============================================================================================================================
  # Lints via the dbt subproject's uv venv so sqlfluff sees the same dbt-core +
  # dbt-duckdb + dbt_packages/ a developer sees locally. Requires
  # `uv run dbt deps --profiles-dir .` to have been run once in
  # dbt/cms_analytics/ (documented in that project's README).
  #
  # sqlfluff refuses to load the dbt templater from a .sqlfluff in a
  # subdirectory of the cwd, so the wrapper cd's into dbt/cms_analytics/ and
  # rewrites the repo-relative paths pre-commit passes in.
  - repo: local
    hooks:
      - id: sqlfluff-lint
        name: sqlfluff lint (dbt models)
        language: system
        entry: bash -c 'cd dbt/cms_analytics && uv run sqlfluff lint "${@#dbt/cms_analytics/}"' --
        files: ^dbt/cms_analytics/.*\.sql$
