# --- Drug spending & utilization ---------------------------------------------
# Part B Spending by Drug rides the same DCAT-catalog bulk-CSV path as the
# provider-summary datasets above. Medicaid SDUD lives on the separate
# data.medicaid.gov DKAN deployment whose metastore exposes the CSV
# downloadURL directly; one UUID per year, so partitioning is done at the
# dataset_id level rather than via a `year` selector. PR-5's original
# spec assumed both domains were still on Socrata — they have since
# migrated to DKAN, hence the source change.

[[dataset]]
key = "medicare_part_b_spending_by_drug"
source = "dkan_data_api_bulk"
dataset_id = "76a714ad-3a2c-43ac-b76d-9dadf8f7d890"
description = "Medicare Part B Spending by Drug — annual (CMS data-api/v1 dataset `76a714ad-3a2c-43ac-b76d-9dadf8f7d890`). Landed via DuckDB bulk-CSV by the `cms_medicare_part_b_spending_by_drug` Dagster asset."
group = "cms_raw_drug_spending"

[[dataset]]
key = "medicaid_state_drug_utilization_2023"
source = "dkan_medicaid_bulk"
dataset_id = "d890d3a9-6b00-43fd-8b31-fcba4c8e2909"
description = "Medicaid State Drug Utilization Data 2023 (data.medicaid.gov DKAN dataset `d890d3a9-6b00-43fd-8b31-fcba4c8e2909`). Landed via DuckDB bulk-CSV by the `cms_medicaid_state_drug_utilization_2023` Dagster asset. CMS partitions SDUD as one dataset UUID per calendar year; this row tracks 2023 — additional years can be added as separate registry rows."
group = "cms_raw_drug_spending"

# --- Open Payments (Sunshine Act) --------------------------------------------
# openpaymentsdata.cms.gov is its own DKAN deployment whose metastore is
# rooted at /api/1/ (same shape as data.medicaid.gov). Each dataset
# carries a single direct-CSV distribution; CMS partitions by program
# year at the UUID level, so each PY is a separate registry row. These
# IDs are the 2024 program-year datasets (latest published; CMS posts
# the prior calendar year's data in mid-following-year). General
# Payments alone is ~12M rows — streamed straight to Parquet via the
# same DuckDB bulk-CSV path used for the provider-summary datasets.

[[dataset]]
key = "open_payments_general_2024"
source = "dkan_open_payments_bulk"
dataset_id = "e6b17c6a-2534-4207-a4a1-6746a14911ff"
description = "Open Payments — General Payments, program year 2024 (`openpaymentsdata.cms.gov` DKAN dataset `e6b17c6a-2534-4207-a4a1-6746a14911ff`). Industry-to-physician transfers under the Sunshine Act; ~12M rows. Landed via DuckDB bulk-CSV by the `cms_open_payments_general_2024` Dagster asset. CMS partitions Open Payments at the UUID level — one dataset per program year."
group = "cms_raw_open_payments"

[[dataset]]
key = "open_payments_research_2024"
source = "dkan_open_payments_bulk"
dataset_id = "2f15cb85-8887-4dcc-a318-1f8ec1d815b3"
description = "Open Payments — Research Payments, program year 2024 (`openpaymentsdata.cms.gov` DKAN dataset `2f15cb85-8887-4dcc-a318-1f8ec1d815b3`). Landed via DuckDB bulk-CSV by the `cms_open_payments_research_2024` Dagster asset."
group = "cms_raw_open_payments"

[[dataset]]
key = "open_payments_ownership_2024"
source = "dkan_open_payments_bulk"
dataset_id = "9ac4f7f8-b6e4-4d80-8410-4aba7e71dd02"
description = "Open Payments — Physician Ownership and Investment Interests, program year 2024 (`openpaymentsdata.cms.gov` DKAN dataset `9ac4f7f8-b6e4-4d80-8410-4aba7e71dd02`). Landed via DuckDB bulk-CSV by the `cms_open_payments_ownership_2024` Dagster asset."
group = "cms_raw_open_payments"

# --- Marketplace QHP Landscape PUFs ------------------------------------------
# data.healthcare.gov is its own bare-metastore DKAN (same `/api/1/` shape as
# data.medicaid.gov + openpaymentsdata.cms.gov) but the QHP Landscape PUFs
# distribute as ZIP-bundled XLSX, not direct CSV. The Dagster asset downloads
# the ZIP, extracts the single XLSX, and streams it to Parquet via DuckDB's
# excel extension (`read_xlsx`). Row 1 of every QHP XLSX is a metadata count
# ("N displayed records"), so the loader reads from A2 with `stop_at_empty`.
# Each plan year is a separate UUID; pinning PY2026 here matches the
# Open Payments per-year pattern. The Marketplace API at
# marketplace.api.healthcare.gov is a consumer plan-shopping surface (not
# bulk-extractable) and intentionally not wired up.

[[dataset]]
key = "qhp_landscape_individual_medical_2026"
source = "dkan_healthcare_gov_zip"
dataset_id = "6fe7fb77-7291-4104-952f-7c7e2c5d0c45"
description = "QHP Landscape PY2026 Individual Medical (data.healthcare.gov DKAN dataset `6fe7fb77-7291-4104-952f-7c7e2c5d0c45`). Certified medical plans offered on the individual market by county. Landed by the `cms_qhp_landscape_individual_medical_2026` Dagster asset: ZIP-bundled XLSX, extracted and streamed to Parquet via DuckDB's `read_xlsx`. CMS partitions QHP Landscape at the UUID level — one dataset per plan year."
group = "cms_raw_marketplace"

[[dataset]]
key = "qhp_landscape_individual_dental_2026"
source = "dkan_healthcare_gov_zip"
dataset_id = "0c494938-ccdb-412a-be89-9cb69fd82e28"
description = "QHP Landscape PY2026 Individual Dental (data.healthcare.gov DKAN dataset `0c494938-ccdb-412a-be89-9cb69fd82e28`). Certified stand-alone dental plans on the individual market by county. Landed by the `cms_qhp_landscape_individual_dental_2026` Dagster asset."
group = "cms_raw_marketplace"

[[dataset]]
key = "qhp_landscape_shop_medical_2026"
source = "dkan_healthcare_gov_zip"
dataset_id = "d1241e9c-2a73-435c-afb0-f231645b63c8"
description = "QHP Landscape PY2026 Medical SHOP (data.healthcare.gov DKAN dataset `d1241e9c-2a73-435c-afb0-f231645b63c8`). Certified medical plans on the Small Business Health Options Program market by county. Landed by the `cms_qhp_landscape_shop_medical_2026` Dagster asset."
group = "cms_raw_marketplace"

[[dataset]]
key = "qhp_landscape_shop_dental_2026"
