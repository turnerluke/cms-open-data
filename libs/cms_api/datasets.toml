# --- Provider Summary by Type of Service -------------------------------------
# CMS data-api/v1 datasets distributed as annual CSVs via the DCAT catalog at
# /data.json. Per-row size is large (10M+ for Physician by Provider and
# Service); the bulk-CSV generator hands the URL to DuckDB rather than
# paginating JSON. `dataset_id` is the bare UUID portion of the catalog's
# /data-api/v1/dataset/<uuid>/... identifier. Without an explicit `year`
# the latest CSV distribution is materialized.

[[dataset]]
key = "medicare_physician_by_provider"
source = "dkan_data_api_bulk"
dataset_id = "8889d81e-2ee7-448f-8713-f071038289b5"
description = "Medicare Physician & Other Practitioners — by Provider."
group = "cms_raw_provider_summary"

[[dataset]]
key = "medicare_physician_by_provider_and_service"
source = "dkan_data_api_bulk"
dataset_id = "92396110-2aed-4d63-a6a2-5d6207d46a29"
description = "Medicare Physician & Other Practitioners — by Provider and Service."
group = "cms_raw_provider_summary"

[[dataset]]
key = "medicare_physician_by_geography_and_service"
source = "dkan_data_api_bulk"
dataset_id = "6fea9d79-0129-4e4c-b1b8-23cd86a4f435"
description = "Medicare Physician & Other Practitioners — by Geography and Service."
group = "cms_raw_provider_summary"

[[dataset]]
key = "medicare_part_d_prescribers_by_provider"
source = "dkan_data_api_bulk"
dataset_id = "14d8e8a9-7e9b-4370-a044-bf97c46b4b44"
description = "Medicare Part D Prescribers — by Provider."
group = "cms_raw_provider_summary"

[[dataset]]
key = "medicare_part_d_prescribers_by_provider_and_drug"
source = "dkan_data_api_bulk"
dataset_id = "9552739e-3d05-4c1b-8eff-ecabf391e2e5"
