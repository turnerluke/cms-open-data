# CMS open-data dataset registry.
#
# One [[dataset]] entry per Dagster asset. The generator in
# `dagster/cms_pipelines/src/cms_pipelines/defs/cms/registry_assets.py`
# emits one `@asset` named `cms_<key>` per row here.
#
# `description` is also the source of truth for the dbt sources file at
# `dbt/cms_analytics/models/staging/cms/_cms__sources.yml` — that file is
# regenerated from this registry by `scripts/gen_cms_sources.py` (run on
# every commit by pre-commit, and verified by `tests/test_dbt_sources_in_sync.py`).
# Write descriptions as the prose you want to see in dbt; the generator
# wraps them at ~70 cols when emitting YAML.
#
# Required fields: key, source, description, group.
# Source-specific required fields:
#   - socrata: dataset_id (Socrata 4x4)
#   - healthcare_gov: path (e.g. "/api/glossary.json")
#   - dkan_provider_data: dataset_id (Provider Data Catalog UUID/4x4)
#   - dkan_healthcare_gov_zip: dataset_id (QHP Landscape ZIP-XLSX UUID)
# Cross-field validation lives in `cms_api.registry.DatasetSpec`.

[[dataset]]
key = "part_d_spending_by_drug"
source = "socrata"
dataset_id = "mhdd-npjx"
description = "Medicare Part D Spending by Drug (CMS Socrata dataset `mhdd-npjx`). Landed by the `cms_part_d_spending_by_drug` Dagster asset; one Parquet file per asset run."
group = "cms_raw"

[[dataset]]
key = "healthcare_gov_glossary"
source = "healthcare_gov"
path = "/api/glossary.json"
description = "Healthcare.gov glossary terms. Landed by the `cms_healthcare_gov_glossary` Dagster asset."
group = "cms_raw"

[[dataset]]
key = "healthcare_gov_articles"
source = "healthcare_gov"
path = "/api/articles.json"
description = "Healthcare.gov articles. Landed by the `cms_healthcare_gov_articles` Dagster asset."
group = "cms_raw"

